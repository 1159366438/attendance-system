# git-cliff Configuration File
# 配置自动生成CHANGELOG的规则

[changelog]
# changelog header
header = """
# 变更日志\n
"""
# template for the changelog body
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [unreleased]
{% endif %}\

{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | upper_first }}
    {% for commit in commits %}
        - {% if commit.breaking %}[**BREAKING**] {% endif %}{{ commit.message | upper_first }}\
    {% endfor %}
{% endfor %}\n
"""
# remove the leading and trailing whitespace from the template
trim = true

[git]
# parse the commits based on https://www.conventionalcommits.org
conventional_commits = true
# filter out the commits that are not conventional
filter_unconventional = true
# regex for parsing and grouping commits
commit_parsers = [
    { message = "^feat", group = "✨ 新增功能" },
    { message = "^fix", group = "🐛 Bug 修复" },
    { message = "^doc", group = "📝 文档更新" },
    { message = "^perf", group = "⚡ 性能优化" },
    { message = "^refactor", group = "🔧 重构与代码质量" },
    { message = "^style", group = "🎨 代码风格" },
    { message = "^test", group = "🧪 测试" },
    { message = "^chore\\(release\\):", skip = true },
    { message = "^chore", group = "🔨 杂项" },
]
# protect breaking changes from being skipped due to unmatched commit parser
protect_breaking_commits = false
# filter out the commits that are not matched by commit parsers
filter_commits = false
# glob pattern for matching git tags
tag_pattern = "v[0-9]*"
# regex for skipping tags
skip_tags = "v0.1.0-beta.1"
# regex for ignoring tags
ignore_tags = ""
# sort the tags topologically
topo_order = false
# sort the commits inside groups by date
sort_commits = "oldest"